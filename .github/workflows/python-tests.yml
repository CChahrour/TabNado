name: Tests

on:
  push:

jobs:
  unit:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Run unit tests
        run: uv run --python 3.12 pytest -vv -s -rA tests/unit

  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_target:
          - tests/integration/test_peaks.py
          - tests/integration/test_pipeline_gandalf.py
          - tests/integration/test_pipeline_xgboost.py
    env:
      UV_PYTHON: "3.12"
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --all-extras --frozen
          uv pip install pytorch-tabular==1.2.0 --no-deps
          uv pip install "pytorch-lightning>=2.0.0,<2.7.0" "torchmetrics>=0.10.0,<1.9.0"

      - name: Run tests (${{ matrix.test_target }})
        run: >-
          uv run --python 3.12 pytest
          -vv -s -rA
          ${{ matrix.test_target }}
