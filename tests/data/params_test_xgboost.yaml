# tabnado parameters — XGBoost backend test
target: TEST
model_name: XGBoost
sweep_fraction: 0.5
gtf_file: tests/data/test_anno.gtf
eval_chr: chr8
test_chr: chr9
output_dir: test_output/results
dataset: test_output/data
chunk_size_rows: 1000000
n_sweeps: 2
logging: tensorboard
min_target: 1
min_features: 3
exclude_ips: ["AF4C", "MLLC"]
prefixes: ["CAT", "ChIP", "CM"]
window_size: 2000
step_size: 250
tile_size: 1000
